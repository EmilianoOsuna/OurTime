<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- Primary Meta -->
    <title>Our Time | Shared Chapters</title>
    <meta name="description" content="Planes, finanzas y memorias para parejas. Organiza vuestra historia juntos." />
    <meta name="theme-color" content="#9b4500" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png" />
    <link rel="shortcut icon" href="/favicon.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- iOS PWA - Critical for fullscreen on iPhone -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Our Time" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- iPhone Splash Screens (portrait) -->
    <!-- iPhone 14 Pro Max -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/apple-touch-icon.png" />
    <!-- iPhone 14 Pro -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/apple-touch-icon.png" />
    <!-- iPhone 14 / 13 / 12 -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/apple-touch-icon.png" />
    <!-- iPhone SE / 8 / 7 / 6 -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="/apple-touch-icon.png" />

    <!-- Android -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- MS Tiles (Windows Phone) -->
    <meta name="msapplication-TileColor" content="#9b4500" />
    <meta name="msapplication-TileImage" content="/pwa-192x192.png" />

    <!-- Google Fonts — Newsreader (display serif) + Hanken Grotesk (UI sans) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- Inline splash to prevent white flash before React loads -->
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
